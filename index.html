<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0a0014" />
    <meta name="description" content="Zen Keeper: Sophia's Light — a Gnostic-themed meditation trainer and awareness tracker." />
    <title>Zen Keeper: Sophia's Light</title>
    <style>
      html, body, #root { margin: 0; padding: 0; min-height: 100%; background: #0a0014; }
      body { font-family: 'Palatino Linotype','Book Antiqua',Palatino,serif; color: #e8e0ff; -webkit-font-smoothing: antialiased; }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <!-- Diagnostic: always-visible status line. Shows what stage loading is at.
         React will overwrite #root on mount; if it doesn't, this stays visible
         and tells us where things died. -->
    <div id="diag" style="position:fixed;top:0;left:0;right:0;padding:10px 14px;font-family:monospace;font-size:12px;color:#8A7AA8;background:rgba(10,0,20,0.9);border-bottom:1px solid rgba(180,140,255,0.25);z-index:99999;white-space:pre-wrap;word-break:break-word;">
      [1] html loaded
    </div>
    <script>
      (function(){
        var d = document.getElementById('diag');
        function log(s){ if(d) d.textContent += '\n' + s; }
        log('[2] inline script ran');
        log('[UA] ' + (navigator.userAgent || '?').slice(0,120));
        log('[modules] ' + ('noModule' in document.createElement('script') ? 'supported' : 'NOT supported'));

        // CAPTURE-phase handler — script/link element errors don't bubble to
        // window, so the default listener misses them. Capture catches them.
        window.addEventListener('error', function(e){
          var tgt = e.target;
          if (tgt && (tgt.tagName === 'SCRIPT' || tgt.tagName === 'LINK')) {
            log('[RESOURCE ERROR] ' + tgt.tagName + ' ' + (tgt.src || tgt.href || '?').slice(-80));
          } else {
            log('[ERROR] ' + (e.message || 'unknown') + (e.filename ? ' @ ' + e.filename.split('/').slice(-1) : ''));
          }
        }, true);
        window.addEventListener('unhandledrejection', function(e){
          log('[REJECT] ' + ((e.reason && e.reason.message) || String(e.reason)));
        });
        window.__zkDiag = log;

        // Fetch-test the current page's module scripts so we know if the
        // bundle URL is actually reachable.
        var scripts = document.querySelectorAll('script[type="module"][src]');
        for (var i = 0; i < scripts.length; i++) {
          (function(s){
            var url = s.src;
            log('[fetching] ' + url.split('/').slice(-1)[0]);
            fetch(url, { method: 'GET', cache: 'no-store' })
              .then(function(r){
                log('[fetch] ' + r.status + ' ' + url.split('/').slice(-1)[0] + ' (ct=' + (r.headers.get('content-type') || '?') + ')');
                return r.text();
              })
              .then(function(t){
                log('[bytes] ' + t.length + ' first20=' + JSON.stringify(t.slice(0,20)));
              })
              .catch(function(e){ log('[fetch FAIL] ' + e.message); });
          })(scripts[i]);
        }
      })();
    </script>

    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
