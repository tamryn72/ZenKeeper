# Netlify build config — alternative deploy target.
# Use `VITE_BASE=/` so assets resolve at the site root rather than /ZenKeeper/.
[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"
  VITE_BASE = "/"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
